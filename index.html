<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>확증임상 순응률 대시보드</title>

  <!-- CDN -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>

  <style>
    :root {
      --c-bg: #f8fafc;
      --c-surface: #ffffff;
      --c-border: #e2e8f0;
      --c-border-light: #f1f5f9;
      --c-text: #0f172a;
      --c-text-secondary: #64748b;
      --c-text-muted: #94a3b8;
      --c-primary: #6366f1;
      --c-primary-hover: #4f46e5;
      --c-primary-light: #eef2ff;
      --c-primary-border: #c7d2fe;
      --c-danger: #ef4444;
      --c-danger-bg: #fef2f2;
      --c-warning: #f59e0b;
      --c-warning-bg: #fffbeb;
      --c-success: #10b981;
      --c-success-bg: #ecfdf5;
      --c-green: #22c55e;
      --c-red: #f87171;
      --c-gray: #e2e8f0;
      --shadow-sm: 0 1px 2px rgba(0,0,0,.04);
      --shadow-md: 0 2px 8px rgba(0,0,0,.06);
      --shadow-lg: 0 4px 24px rgba(0,0,0,.1);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--c-bg); color: var(--c-text); font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }

    /* ── 레이아웃 ── */
    .layout { display: flex; min-height: 100vh; }

    .sidebar {
      width: 260px; min-width: 220px;
      background: var(--c-surface);
      border-right: 1px solid var(--c-border);
      padding: 28px 20px;
      display: flex; flex-direction: column; gap: 20px;
      flex-shrink: 0;
    }
    .sidebar h2 { font-size: 11px; color: var(--c-text-muted); text-transform: uppercase; letter-spacing: .08em; font-weight: 600; }
    .sidebar-brand { font-size: 15px; font-weight: 700; color: var(--c-primary); letter-spacing: -.01em; }

    .main { flex: 1; padding: 32px 36px; overflow-x: hidden; }
    h1 { font-size: 24px; font-weight: 700; color: var(--c-text); letter-spacing: -.02em; margin-bottom: 4px; }
    .caption { font-size: 13px; color: var(--c-text-muted); margin-bottom: 24px; }

    /* ── 카드 ── */
    .cards { display: flex; gap: 16px; margin-bottom: 28px; flex-wrap: wrap; }
    .card {
      background: var(--c-surface); border-radius: var(--radius-md); padding: 20px 24px;
      box-shadow: var(--shadow-sm); border: 1px solid var(--c-border);
      flex: 1; min-width: 150px; transition: box-shadow .2s;
    }
    .card:hover { box-shadow: var(--shadow-md); }
    .card-label { font-size: 12px; color: var(--c-text-muted); margin-bottom: 8px; font-weight: 500; text-transform: uppercase; letter-spacing: .03em; }
    .card-value { font-size: 30px; font-weight: 700; letter-spacing: -.02em; }
    .card-value.danger { color: var(--c-danger); }
    .card-value.success { color: var(--c-success); }

    /* ── 필터 ── */
    .filter-group { display: flex; flex-direction: column; gap: 8px; }
    .filter-group label { font-size: 12px; font-weight: 600; color: var(--c-text-secondary); }
    select, .multiselect-wrap { width: 100%; border: 1px solid var(--c-border); border-radius: var(--radius-sm); padding: 8px 10px; font-size: 13px; background: var(--c-surface); transition: border-color .15s; }
    select:focus, .multiselect-wrap:focus-within { border-color: var(--c-primary); outline: none; box-shadow: 0 0 0 3px rgba(99,102,241,.1); }
    .multiselect-wrap { max-height: 180px; overflow-y: auto; }
    .multiselect-wrap label { display: flex; align-items: center; gap: 8px; font-weight: 400; padding: 4px 0; cursor: pointer; font-size: 13px; color: var(--c-text-secondary); }
    .checkbox-row { display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; color: var(--c-text-secondary); }

    /* ── 버튼 ── */
    button.refresh-btn {
      width: 100%; padding: 10px; border: none; border-radius: var(--radius-sm);
      background: var(--c-primary); color: #fff; font-size: 13px; cursor: pointer; font-weight: 600;
      transition: background .15s;
    }
    button.refresh-btn:hover { background: var(--c-primary-hover); }

    /* ── 탭 ── */
    .tabs { display: flex; gap: 4px; margin-bottom: 24px; flex-wrap: wrap; background: var(--c-border-light); padding: 4px; border-radius: var(--radius-sm); }
    .tab-btn {
      padding: 10px 18px; border: none; border-radius: 6px; font-size: 13px;
      cursor: pointer; color: var(--c-text-secondary); background: transparent; font-weight: 500;
      transition: all 0.15s ease;
    }
    .tab-btn:hover { color: var(--c-text); background: rgba(255,255,255,.6); }
    .tab-btn.active { color: var(--c-text); background: var(--c-surface); font-weight: 600; box-shadow: var(--shadow-sm); }

    /* ── 서브탭 ── */
    .sub-tabs { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
    .sub-tab-group { display: flex; align-items: center; gap: 6px; }
    .sub-tab-label { font-size: 12px; color: var(--c-text-muted); margin-right: 2px; font-weight: 500; }
    .sub-tab-btn { padding: 5px 14px; border: 1px solid var(--c-border); border-radius: 20px; background: var(--c-surface); font-size: 12px; cursor: pointer; color: var(--c-text-secondary); transition: all .15s; font-weight: 500; }
    .sub-tab-btn:hover { background: var(--c-primary-light); border-color: var(--c-primary-border); color: var(--c-primary); }
    .sub-tab-btn.active { background: var(--c-primary); color: #fff; border-color: var(--c-primary); font-weight: 600; }

    /* ── 테이블 ── */
    .table-wrap { overflow-x: auto; border-radius: var(--radius-md); border: 1px solid var(--c-border); }
    table { width: 100%; border-collapse: collapse; font-size: 13px; background: var(--c-surface); }
    th { background: var(--c-border-light); padding: 12px 14px; text-align: left; font-weight: 600; color: var(--c-text-secondary); border-bottom: 1px solid var(--c-border); white-space: nowrap; cursor: pointer; user-select: none; font-size: 12px; text-transform: uppercase; letter-spacing: .03em; }
    th:hover { background: var(--c-primary-light); }
    td { padding: 11px 14px; border-bottom: 1px solid var(--c-border-light); white-space: nowrap; color: var(--c-text); }
    tr:last-child td { border-bottom: none; }
    .badge-ended { font-size: 10px; background: var(--c-border); padding: 2px 8px; border-radius: 10px; color: var(--c-text-secondary); margin-left: 6px; font-weight: 500; }

    /* ── 범례 ── */
    .legend { display: flex; gap: 16px; margin-bottom: 12px; font-size: 13px; color: var(--c-text-secondary); }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-dot { width: 12px; height: 12px; border-radius: 3px; }

    /* ── 설명 박스 ── */
    .tab-desc { background: var(--c-border-light); border-radius: var(--radius-sm); padding: 14px 18px; margin-bottom: 16px; font-size: 13px; color: var(--c-text-secondary); line-height: 1.6; border-left: 3px solid var(--c-primary); }

    /* ── 인사이트 ── */
    .insight-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
    .insight-card {
      background: var(--c-surface); border-radius: var(--radius-md); padding: 18px 22px;
      box-shadow: var(--shadow-sm); border: 1px solid var(--c-border);
    }
    .insight-card h3 { font-size: 14px; font-weight: 700; color: var(--c-text); margin-bottom: 10px; }
    .insight-list { list-style: none; font-size: 13px; color: var(--c-text-secondary); }
    .insight-list li { padding: 5px 0; border-bottom: 1px solid var(--c-border-light); display: flex; justify-content: space-between; }
    .insight-list li:last-child { border-bottom: none; }
    .insight-tag { font-size: 11px; padding: 3px 10px; border-radius: 12px; font-weight: 600; }
    .insight-tag.danger { background: var(--c-danger-bg); color: var(--c-danger); }
    .insight-tag.warning { background: var(--c-warning-bg); color: var(--c-warning); }
    .insight-tag.success { background: var(--c-success-bg); color: var(--c-success); }
    .hospital-kpi-table { width: 100%; border-collapse: collapse; font-size: 13px; background: var(--c-surface); border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--c-border); margin-bottom: 20px; }
    .hospital-kpi-table th { background: var(--c-border-light); padding: 12px 14px; text-align: center; font-weight: 600; color: var(--c-text-secondary); border-bottom: 1px solid var(--c-border); white-space: nowrap; font-size: 12px; }
    .hospital-kpi-table td { padding: 11px 14px; border-bottom: 1px solid var(--c-border-light); text-align: center; white-space: nowrap; }
    .hospital-kpi-table tr:last-child td { border-bottom: none; }
    @media (max-width: 900px) { .insight-grid { grid-template-columns: 1fr; } }

    /* ── 미니 히트맵 툴팁 ── */
    #mini-heatmap {
      display: none; position: fixed; z-index: 1000;
      background: var(--c-surface); border-radius: var(--radius-md); padding: 16px 18px;
      box-shadow: var(--shadow-lg); pointer-events: none;
      max-width: 420px; border: 1px solid var(--c-border);
    }
    #mini-heatmap .mh-title { font-size: 13px; font-weight: 700; margin-bottom: 8px; color: var(--c-text); }
    #mini-heatmap .mh-meta { font-size: 11px; color: var(--c-text-muted); margin-bottom: 10px; }
    #mini-heatmap .mh-grid {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px;
    }
    #mini-heatmap .mh-cell {
      width: 26px; height: 26px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 600; color: #fff;
    }
    #mini-heatmap .mh-cell.used { background: var(--c-green); }
    #mini-heatmap .mh-cell.unused { background: var(--c-red); }
    #mini-heatmap .mh-cell.future { background: var(--c-gray); color: var(--c-text-muted); }
    #mini-heatmap .mh-legend { display: flex; gap: 14px; margin-top: 10px; font-size: 11px; color: var(--c-text-muted); }
    #mini-heatmap .mh-legend span::before { content: ''; display: inline-block; width: 10px; height: 10px; border-radius: 3px; margin-right: 5px; vertical-align: -1px; }
    #mini-heatmap .mh-legend .lg-used::before { background: var(--c-green); }
    #mini-heatmap .mh-legend .lg-unused::before { background: var(--c-red); }
    #mini-heatmap .mh-legend .lg-future::before { background: var(--c-gray); }
    tr[data-uid] { cursor: default; transition: background .1s; }
    tr[data-uid]:hover { background: var(--c-primary-light) !important; }

    /* ── 스피너 ── */
    #spinner { display: none; position: fixed; inset: 0; background: rgba(248,250,252,.85); backdrop-filter: blur(4px); justify-content: center; align-items: center; z-index: 999; }
    #spinner.show { display: flex; }
    .spinner-content { text-align: center; }
    .spinner-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: var(--c-primary); margin: 0 4px; animation: bounce .6s ease-in-out infinite; }
    .spinner-dot:nth-child(2) { animation-delay: .1s; }
    .spinner-dot:nth-child(3) { animation-delay: .2s; }
    @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    .spinner-text { margin-top: 12px; font-size: 14px; font-weight: 600; color: var(--c-text-secondary); }

    /* ── 반응형 ── */
    @media (max-width: 700px) {
      .layout { flex-direction: column; }
      .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--c-border); }
      .main { padding: 20px 16px; }
    }
  </style>
</head>
<body>

<div id="spinner"><div class="spinner-content"><div><span class="spinner-dot"></span><span class="spinner-dot"></span><span class="spinner-dot"></span></div><div class="spinner-text">데이터를 불러오는 중...</div></div></div>

<div class="layout">
  <!-- 사이드바 -->
  <aside class="sidebar">
    <div class="sidebar-brand">💊 순응률 대시보드</div>

    <button class="refresh-btn" onclick="loadData(true)">데이터 새로고침</button>

    <hr style="border:none;border-top:1px solid var(--c-border)">
    <h2>필터</h2>

    <div class="filter-group">
      <label>기관 선택</label>
      <div class="multiselect-wrap" id="hospital-filter"></div>
    </div>

    <label class="checkbox-row">
      <input type="checkbox" id="no-use-only" onchange="applyFilters()">
      미사용자만 보기
    </label>

    <label class="checkbox-row">
      <input type="checkbox" id="yellow-card-only" onchange="applyFilters()">
      옐로카드 있는 환자만 보기
    </label>

    <div style="margin-top:auto;padding-top:16px;border-top:1px solid var(--c-border);display:flex;flex-direction:column;gap:6px;font-size:12px">
      <a href="https://docs.google.com/spreadsheets/d/1Ao0BR5ex4orskBqoJYskLTgl6FGzLxNCQr8nJ-nK1Mw/edit?gid=662044972#gid=662044972" target="_blank" rel="noopener noreferrer" style="color:var(--c-primary);text-decoration:none">📄 환자 데이터 시트 ↗</a>
      <a href="https://docs.google.com/spreadsheets/d/1Ao0BR5ex4orskBqoJYskLTgl6FGzLxNCQr8nJ-nK1Mw/edit?gid=12940537#gid=12940537" target="_blank" rel="noopener noreferrer" style="color:var(--c-primary);text-decoration:none">📄 세션 기록 시트 ↗</a>
    </div>
  </aside>

  <!-- 메인 -->
  <main class="main">
    <h1>확증임상 순응률 대시보드</h1>
    <div class="caption" id="caption">-</div>

    <!-- 요약 카드 -->
    <div class="sub-tabs" style="margin-bottom:8px">
      <div class="sub-tab-group">
        <span class="sub-tab-label">범위:</span>
        <button class="sub-tab-btn active" onclick="setCardScope('all', this)">전체</button>
        <button class="sub-tab-btn" onclick="setCardScope('active', this)">사용중</button>
      </div>
    </div>
    <div class="cards">
      <div class="card">
        <div class="card-label">전체 대상자</div>
        <div class="card-value" id="card-total">-</div>
      </div>
      <div class="card">
        <div class="card-label">미사용자</div>
        <div class="card-value danger" id="card-nouse">-</div>
      </div>
      <div class="card">
        <div class="card-label">옐로카드 보유자</div>
        <div class="card-value danger" id="card-yellow">-</div>
      </div>
      <div class="card">
        <div class="card-label">평균 순응률</div>
        <div class="card-value success" id="card-avg">-</div>
      </div>
    </div>

    <!-- 탭 -->
    <div class="tabs" id="main-tabs">
      <button class="tab-btn active" onclick="switchTab('table', this)">환자 테이블</button>
      <button class="tab-btn" onclick="switchTab('heatmap', this)">일별 히트맵</button>
      <button class="tab-btn" onclick="switchTab('dist', this)">순응률 분포</button>
      <button class="tab-btn" onclick="switchTab('hospital', this)">기관별 요약</button>
    </div>

    <div id="tab-table">
      <div class="sub-tabs" id="table-sub-tabs">
        <div class="sub-tab-group">
          <span class="sub-tab-label">상태:</span>
          <button class="sub-tab-btn active" onclick="switchTableStatus('all', this)">전체</button>
          <button class="sub-tab-btn" onclick="switchTableStatus('active', this)">사용중</button>
          <button class="sub-tab-btn" onclick="switchTableStatus('ended', this)">만료됨</button>
        </div>
        <div class="sub-tab-group" id="hospital-sub-tabs"></div>
      </div>
      <div class="table-wrap">
        <table id="patient-table">
          <thead>
            <tr>
              <th onclick="sortTable('subject_id')">피험자번호 ↕</th>
              <th onclick="sortTable('hospital')">소속기관 ↕</th>

              <th onclick="sortTable('end_dt')">처방 종료일 ↕</th>
              <th onclick="sortTable('elapsed_days')">경과일 ↕</th>

    <div id="tab-heatmap" style="display:none">

        <div class="legend-item"><div class="legend-dot" style="background:var(--c-green)"></div>사용</div>

    <div id="tab-dist" style="display:none">
      <div class="tab-desc">

<div id="mini-heatmap"></div>

<script>
// ── 상수 ──────────────────────────────────────────────────────────────────
const SHEET_ID = "1Ao0BR5ex4orskBqoJYskLTgl6FGzLxNCQr8nJ-nK1Mw";
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;
const SESSION_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=12940537`;

const HOSPITAL_PREFIX = {
  "서울대학교병원": "h01",
  "강북삼성병원": "h02",
  "강동경희대학교병원": "h03",
  "경희대학교병원": "h04",
  "차의과대학교 분당차병원": "h05",
  "가톨릭관동대학교 국제성모병원": "h06",
};

const MAX_DAYS = 28;
const YELLOW_CARD_RULES = [
  { day: 7,  target: 3 },
  { day: 14, target: 6 },
  { day: 21, target: 9 },
  { day: 24, target: 10 },
];
let allRows = [];         // 처리된 전체 데이터
let filteredRows = [];    // 필터 적용 후
let sortKey = "yellow_cards";
let sortAsc = false;
let lastLoaded = null;
let sessionMap = {};      // { user_id: { dayN: [sessionId, ...], ... } }
let cardScope = "all";    // "all" | "active"
let tableStatusTab = "all"; // "all" | "active" | "ended"
let tableHospitalTab = "all"; // "all" | hospital name

// 5분 캐시
let cachedCsv = null;
let cachedSessionCsv = null;
let cachedAt  = null;
const CACHE_TTL_MS = 5 * 60 * 1000;

// ── 타임존: 익일 정오(12:00) 경계 ────────────────────────────────────────
/**
 * @param {Date} startDt
 * @param {Date} referenceDt
 * @returns {number} 0~28
 */
function calcElapsedDays(startDt, referenceDt) {
  if (!startDt || isNaN(startDt) || referenceDt < startDt) return 0;
  const anchor = new Date(startDt);
  anchor.setHours(12, 0, 0, 0);
  const deltaMs = referenceDt - anchor;
  if (deltaMs < 0) return 0;
  // 가입 당일(정오~익일 정오) = 0일차 → 순응 미표시
  // 익일 정오 이후 = 1일차부터 카운트
  return Math.min(Math.floor(deltaMs / 86400000), MAX_DAYS);
}

function calcCompliance(usedDays, elapsedDays) {
  if (elapsedDays === 0) return null;
  return Math.min((usedDays / elapsedDays) * 100, 100);
}

// ── Session Attend Record 파싱 ───────────────────────────────────────────
function parseSessionCsv(csvText) {
  const result = Papa.parse(csvText, { header: false, skipEmptyLines: true });
  const rows = result.data;
  // Row 0: 메타헤더(스킵), Row 1: 컬럼명, Row 2+: 데이터
  if (rows.length < 3) return {};
  const headers = rows[1].map(h => h.trim());
  const dataRows = rows.slice(2);
  const ci = key => headers.indexOf(key);
  const map = {};  // { user_id: { "2025-03-05": [sessionId, ...] } }
  dataRows.forEach(r => {
    const uid = (r[ci("user_id")] || "").trim();
    const createdAt = (r[ci("created_at")] || "").trim();
    const sid = (r[ci("counted_session_id")] || "").trim();
    if (!uid || !createdAt) return;
    // created_at은 UTC → +9h로 KST 날짜 추출
    const utc = new Date(createdAt + "Z");  // UTC 명시
    if (isNaN(utc)) return;
    const kst = new Date(utc.getTime() + 9 * 3600000);
    const dayStr = kst.toISOString().slice(0, 10);  // "YYYY-MM-DD" KST
    if (!map[uid]) map[uid] = {};
    if (!map[uid][dayStr]) map[uid][dayStr] = [];
    if (sid) map[uid][dayStr].push(sid);
  });
  return map;
}

// ── CSV 파싱 & 가공 ──────────────────────────────────────────────────────
function parseCsv(csvText) {
  const result = Papa.parse(csvText, { header: false, skipEmptyLines: true });
  const rows = result.data;

  // Row 0: 메타헤더(스킵), Row 1: 컬럼명, Row 2+: 데이터
  if (rows.length < 3) return [];
  const headers = rows[1].map(h => h.trim());
  const dataRows = rows.slice(2);

  const idx = key => headers.indexOf(key);
  const now = new Date();

  return dataRows
    .filter(r => (r[idx("프로젝트명")] || "").trim() === "확증임상 프로젝트")
    .map(r => {
      const hospital    = (r[idx("소속기관")]    || "").trim();
      const accessCode  = (r[idx("액세스코드")]  || "").trim();
      const prefix      = HOSPITAL_PREFIX[hospital] || "";
      const subject_id  = prefix ? `${prefix}-${accessCode}` : accessCode;

      const userId    = (r[idx("사용자아이디")] || "").trim();
      const startRaw = (r[idx("시작일자")] || "").trim();
      const start_dt = startRaw ? new Date(startRaw) : null;

      // 만료: start_dt + 28일 11:59:59
      let end_dt = null;
      let endRaw = "";
      if (start_dt) {
        end_dt = new Date(start_dt.getTime() + 28 * 86400000);
        end_dt.setHours(11, 59, 59, 999);
        endRaw = `${end_dt.getFullYear()}-${String(end_dt.getMonth()+1).padStart(2,'0')}-${String(end_dt.getDate()).padStart(2,'0')}`;
      }

      // used_days: sessionMap 날짜 → day number 변환
      const rawSessions = sessionMap[userId] || {};
      const userSessions = {};  // { dayNumber: [sessionId, ...] }
      if (start_dt) {
        const anchor = new Date(start_dt);
        anchor.setHours(12, 0, 0, 0);
        Object.entries(rawSessions).forEach(([dateStr, sids]) => {
          const sessDate = new Date(dateStr + "T12:00:00");
          if (isNaN(sessDate)) return;
          const diffMs = sessDate - anchor;
          if (diffMs < 0) return;
          const dayNum = Math.floor(diffMs / 86400000);
          if (dayNum >= 0 && dayNum < MAX_DAYS) {
            userSessions[dayNum] = (userSessions[dayNum] || []).concat(sids);
          }
        });
      }
      const used_days = Object.keys(userSessions).length;

      const ref = (end_dt && end_dt < now) ? end_dt : now;
      const elapsed_days = start_dt ? calcElapsedDays(start_dt, ref) : 0;
      const compVal = calcCompliance(used_days, elapsed_days);

      const is_ended = end_dt && end_dt < now;

      // 옐로카드: 체크포인트별 목표 미달 누적
      const yellow_cards = YELLOW_CARD_RULES.reduce((cnt, rule) => {
        if (elapsed_days < rule.day) return cnt;  // 아직 미도달
        return used_days < rule.target ? cnt + 1 : cnt;
      }, 0);

      return {
        subject_id,
        user_id: userId,
        hospital,
        start_dt,
        end_dt,
        start_str: startRaw,
        end_str:   endRaw,
        used_days,
        elapsed_days,
        compliance: compVal,   // null or 0~100
        yellow_cards,
        is_ended: !!is_ended,
        sessions: userSessions, // { dayN: [sessionId, ...] }
      };
    });
}

// ── 데이터 로드 ──────────────────────────────────────────────────────────
async function loadData(forceRefresh = false) {
  const spinner = document.getElementById("spinner");
  spinner.classList.add("show");

  try {
    const now = Date.now();
    if (!forceRefresh && cachedCsv && cachedSessionCsv && cachedAt && (now - cachedAt) < CACHE_TTL_MS) {
      sessionMap = parseSessionCsv(cachedSessionCsv);
      allRows = parseCsv(cachedCsv);
    } else {
      const [mainResp, sessResp] = await Promise.all([
        fetch(SHEET_URL + "&t=" + now),
        fetch(SESSION_URL + "&t=" + now),
      ]);
      if (!mainResp.ok) throw new Error(`HTTP ${mainResp.status}`);
      if (!sessResp.ok) throw new Error(`Session HTTP ${sessResp.status}`);
      cachedCsv = await mainResp.text();
      cachedSessionCsv = await sessResp.text();
      cachedAt = now;
      sessionMap = parseSessionCsv(cachedSessionCsv);
      allRows = parseCsv(cachedCsv);
    }
    lastLoaded = new Date();
    document.getElementById("caption").textContent =
      `데이터 기준: ${lastLoaded.toLocaleString("ko-KR")}  |  5분 캐시`;

    buildHospitalFilter();
    applyFilters();
  } catch (err) {
    alert("데이터 로드 실패: " + err.message);
  } finally {
    spinner.classList.remove("show");
  }
}

// ── 기관 필터 빌드 ───────────────────────────────────────────────────────
function buildHospitalFilter() {
  const hospitals = [...new Set(allRows.map(r => r.hospital).filter(Boolean))].sort();
  const wrap = document.getElementById("hospital-filter");
  wrap.innerHTML = hospitals.map(h =>
    `<label>
      <input type="checkbox" class="hospital-cb" value="${h}" checked onchange="applyFilters()">
      ${h}
    </label>`
  ).join("");
}

function getSelectedHospitals() {
  return [...document.querySelectorAll(".hospital-cb:checked")].map(cb => cb.value);
}

// ── 필터 적용 ────────────────────────────────────────────────────────────
function applyFilters() {
  const selectedHospitals = getSelectedHospitals();
  const noUseOnly = document.getElementById("no-use-only").checked;
  const yellowOnly = document.getElementById("yellow-card-only").checked;

  filteredRows = allRows.filter(r => {
    if (selectedHospitals.length && !selectedHospitals.includes(r.hospital)) return false;
    if (noUseOnly && r.used_days > 0) return false;
    if (yellowOnly && r.yellow_cards === 0) return false;
    return true;
  });

  buildHospitalSubTabs();
  renderCards();
  renderTable();
  renderHeatmap();
  renderDist();
  renderHospitalChart();
}

// ── 카드 스코프 토글 ──────────────────────────────────────────────────────
function setCardScope(scope, btn) {
  cardScope = scope;
  btn.parentElement.querySelectorAll(".sub-tab-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderCards();
}

// ── 요약 카드 ────────────────────────────────────────────────────────────
function renderCards() {
  const base = cardScope === "active"
    ? filteredRows.filter(r => !r.is_ended)
    : filteredRows;
  const total = base.length;
  const noUse = base.filter(r => r.used_days === 0).length;
  const yellowCount = base.filter(r => r.yellow_cards > 0 && !r.is_ended).length;
  const validRows = base.filter(r => r.elapsed_days > 0 && r.compliance !== null);
  const avg = validRows.length
    ? validRows.reduce((s, r) => s + r.compliance, 0) / validRows.length
    : null;

  const scopeLabel = cardScope === "active" ? " (사용중)" : "";
  document.getElementById("card-total").textContent = total + "명" + scopeLabel;
  document.getElementById("card-nouse").textContent = noUse + "명";
  document.getElementById("card-yellow").textContent = yellowCount + "명";
  document.getElementById("card-avg").textContent = avg !== null ? avg.toFixed(1) + "%" : "-";
}

// ── 테이블 ───────────────────────────────────────────────────────────────
function rowBgColor(compliance) {
  if (compliance === null) return "";
  if (compliance === 0)  return "background:#fef2f2";
  if (compliance < 50)   return "background:#fffbeb";
  if (compliance >= 80)  return "background:#ecfdf5";
  return "";
}

function switchTableStatus(val, btn) {
  tableStatusTab = val;
  btn.parentElement.querySelectorAll(".sub-tab-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderTable();
}

function switchTableHospital(val, btn) {
  tableHospitalTab = val;
  btn.parentElement.querySelectorAll(".sub-tab-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderTable();
}

function buildHospitalSubTabs() {
  const hospitals = [...new Set(filteredRows.map(r => r.hospital))].sort();
  const container = document.getElementById("hospital-sub-tabs");
  let html = '<span class="sub-tab-label">기관:</span>';
  html += `<button class="sub-tab-btn${tableHospitalTab === "all" ? " active" : ""}" onclick="switchTableHospital('all', this)">전체</button>`;
  hospitals.forEach(h => {
    const active = tableHospitalTab === h ? " active" : "";
    const safeH = h.replace(/'/g, "\\'");
    html += `<button class="sub-tab-btn${active}" onclick="switchTableHospital('${safeH}', this)">${h}</button>`;
  });
  container.innerHTML = html;
}

function sortTable(key) {
  if (sortKey === key) sortAsc = !sortAsc;
  else { sortKey = key; sortAsc = true; }
  renderTable();
}

function renderTable() {
  let rows = [...filteredRows];
  if (tableStatusTab === "active") rows = rows.filter(r => !r.is_ended);
  else if (tableStatusTab === "ended") rows = rows.filter(r => r.is_ended);
  if (tableHospitalTab !== "all") rows = rows.filter(r => r.hospital === tableHospitalTab);

  rows.sort((a, b) => {
    let va = a[sortKey], vb = b[sortKey];
    // null을 맨 앞으로
    if (va === null && vb === null) return 0;
    if (va === null) return sortAsc ? -1 : 1;
    if (vb === null) return sortAsc ? 1 : -1;
    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ? 1 : -1;
    return 0;
  });

  const tbody = document.getElementById("table-body");
  tbody.innerHTML = rows.map(r => {
    const comp = r.compliance !== null ? r.compliance.toFixed(1) + "%" : "N/A";
    const endedBadge = r.is_ended ? '<span class="badge-ended">종료</span>' : "";
    const bg = rowBgColor(r.compliance);
    const ycDisplay = r.yellow_cards > 0
      ? `<span style="color:#ef4444;font-weight:700">${r.yellow_cards}</span>`
      : `<span style="color:#94a3b8">0</span>`;
    return `<tr style="${bg}" data-uid="${r.user_id}">
      <td>${r.subject_id}</td>
      <td>${r.hospital}</td>
      <td>${r.start_str}${endedBadge}</td>
      <td>${r.end_str}</td>
      <td>${r.elapsed_days}</td>
      <td>${r.used_days}</td>
      <td>${comp}</td>
      <td style="text-align:center">${ycDisplay}</td>
    </tr>`;
  }).join("");

  document.getElementById("table-caption").textContent = `총 ${rows.length}명 표시 중`;
  attachHoverEvents();
}

// ── 미니 히트맵 (테이블 호버) ─────────────────────────────────────────────
function buildMiniHeatmapHTML(r) {
  const sess = r.sessions || {};
  let title = `<div class="mh-title">${r.subject_id} — ${r.hospital}</div>`;
  let meta = `<div class="mh-meta">순응률 ${r.compliance !== null ? r.compliance.toFixed(1) + '%' : 'N/A'} · 경과 ${r.elapsed_days}일 · 사용 ${r.used_days}일</div>`;
  let cells = '';
  for (let d = 0; d < MAX_DAYS; d++) {
    const daySessions = sess[d] || [];
    const label = d + 1;
    if (d >= r.elapsed_days) {
      cells += `<div class="mh-cell future">${label}</div>`;
    } else if (daySessions.length > 0) {
      cells += `<div class="mh-cell used">${label}</div>`;
    } else {
      cells += `<div class="mh-cell unused">${label}</div>`;
    }
  }
  const legend = `<div class="mh-legend"><span class="lg-used">사용</span><span class="lg-unused">미사용</span><span class="lg-future">미경과</span></div>`;
  return title + meta + `<div class="mh-grid">${cells}</div>` + legend;
}

let hoverAttached = false;
function attachHoverEvents() {
  if (hoverAttached) return;
  hoverAttached = true;
  const tooltip = document.getElementById('mini-heatmap');
  const tbody = document.getElementById('table-body');
  tbody.addEventListener('mouseover', e => {
    const tr = e.target.closest('tr[data-uid]');
    if (!tr) return;
    const uid = tr.getAttribute('data-uid');
    const row = filteredRows.find(r => r.user_id === uid);
    if (!row) return;
    tooltip.innerHTML = buildMiniHeatmapHTML(row);
    tooltip.style.display = 'block';
    positionTooltip(e, tooltip);
  });
  tbody.addEventListener('mousemove', e => {
    const tr = e.target.closest('tr[data-uid]');
    if (!tr) { tooltip.style.display = 'none'; return; }
    positionTooltip(e, tooltip);
  });
  tbody.addEventListener('mouseleave', () => {
    tooltip.style.display = 'none';
  });
}

function positionTooltip(e, el) {
  const pad = 16;
  let x = e.clientX + pad;
  let y = e.clientY + pad;
  const rect = el.getBoundingClientRect();
  if (x + rect.width > window.innerWidth - pad) x = e.clientX - rect.width - pad;
  if (y + rect.height > window.innerHeight - pad) y = e.clientY - rect.height - pad;
  el.style.left = x + 'px';
  el.style.top = y + 'px';
}

// ── 히트맵 ───────────────────────────────────────────────────────────────
function renderHeatmap() {
  const rows = [...filteredRows].sort((a, b) => a.subject_id.localeCompare(b.subject_id));
  if (!rows.length) {
    Plotly.purge("heatmap-chart");
    return;
  }

  const matrix = [];
  const hoverTexts = [];
  const yLabels = rows.map(r => r.subject_id);

  rows.forEach(r => {
    const rowVals  = [];
    const rowHover = [];
    const sess = r.sessions || {};
    for (let d = 0; d < MAX_DAYS; d++) {
      const dayOffset = d * 86400000;
      const dayDt = r.start_dt ? new Date(r.start_dt.getTime() + dayOffset) : null;
      const dateStr = dayDt ? dayDt.toLocaleDateString("ko-KR") : "?";
      const label = d + 1;  // 표시용: 1일차~28일차
      const daySessions = sess[d] || [];
      const hasSession = daySessions.length > 0;

      if (d >= r.elapsed_days) {
        rowVals.push(2);
        rowHover.push(`${r.subject_id} | ${label}일차 (${dateStr}) | 미경과`);
      } else if (hasSession) {
        rowVals.push(1);
        const sidStr = daySessions.map(s => s.length > 5 ? "*****" + s.slice(5) : "*****").join(", ");
        rowHover.push(`${r.subject_id} | ${label}일차 (${dateStr}) | 사용<br>세션: ${sidStr}`);
      } else {
        rowVals.push(0);
        rowHover.push(`${r.subject_id} | ${label}일차 (${dateStr}) | 미사용`);
      }
    }
    matrix.push(rowVals);
    hoverTexts.push(rowHover);
  });

  const xLabels = Array.from({length: MAX_DAYS}, (_, i) => `${i+1}일`);

  const colorscale = [
    [0.00, "#f87171"], [0.33, "#f87171"],
    [0.34, "#22c55e"], [0.66, "#22c55e"],
    [0.67, "#e2e8f0"], [1.00, "#e2e8f0"],
  ];

  const height = Math.max(300, rows.length * 36 + 100);

  Plotly.newPlot("heatmap-chart", [{
    type: "heatmap",
    z: matrix,
    x: xLabels,
    y: yLabels,
    colorscale,
    zmin: 0, zmax: 2,
    showscale: false,
    text: hoverTexts,
    hovertemplate: "%{text}<extra></extra>",
    xgap: 2, ygap: 2,
  }], {
    margin: {l: 100, r: 20, t: 40, b: 60},
    height,
    xaxis: { side: "top", title: "처방 일차" },
    yaxis: { autorange: "reversed" },
    plot_bgcolor: "white",
    paper_bgcolor: "white",
  }, { responsive: true });
}

// ── 분포 차트 ────────────────────────────────────────────────────────────
function renderDist() {
  const validRows = filteredRows.filter(r => r.compliance !== null);
  const compValues = validRows.map(r => r.compliance);

  if (!compValues.length) return;

  // 히스토그램
  Plotly.newPlot("dist-hist-chart", [{
    type: "histogram",
    x: compValues,
    marker: { color: "#6366f1", opacity: 0.85 },
    xbins: { start: 0, end: 100, size: 10 },
  }], {
    xaxis: { title: "순응률(%)", range: [0, 100] },
    yaxis: { title: "환자 수" },
    margin: { l: 50, r: 20, t: 30, b: 50 },
    paper_bgcolor: "white",
    plot_bgcolor: "white",
  }, { responsive: true });

  // 박스플롯
  Plotly.newPlot("dist-box-chart", [{
    type: "box",
    y: compValues,
    marker: { color: "#6366f1" },
    boxpoints: "all",
    jitter: 0.3,
    pointpos: -1.5,
    name: "순응률",
  }], {
    yaxis: { title: "순응률(%)" },
    margin: { l: 50, r: 20, t: 30, b: 30 },
    paper_bgcolor: "white",
    plot_bgcolor: "white",
  }, { responsive: true });
}

function switchDistTab(tab, btn) {
  document.getElementById("dist-hist-chart").style.display = tab === "hist" ? "" : "none";
  document.getElementById("dist-box-chart").style.display  = tab === "box"  ? "" : "none";
  document.querySelectorAll("#tab-dist .tab-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
}

// ── 기관별 차트 + 인사이트 ────────────────────────────────────────────────
function renderHospitalChart() {
  const validRows = filteredRows.filter(r => r.compliance !== null);
  if (!validRows.length) {
    document.getElementById("hospital-insights").innerHTML = "";
    document.getElementById("hospital-kpi-wrap").innerHTML = "";
    Plotly.purge("hospital-chart");
    Plotly.purge("hospital-box-chart");
    return;
  }

  // ── 기관별 통계 집계 ──
  const hospitalStats = {};
  filteredRows.forEach(r => {
    if (!hospitalStats[r.hospital]) {
      hospitalStats[r.hospital] = {
        hospital: r.hospital, total: 0, active: 0, ended: 0,
        noUse: 0, yellowCards: 0, compValues: [], usedDays: [],
      };
    }
    const s = hospitalStats[r.hospital];
    s.total++;
    if (r.is_ended) s.ended++; else s.active++;
    if (r.used_days === 0) s.noUse++;
    if (r.yellow_cards > 0 && !r.is_ended) s.yellowCards++;
    if (r.compliance !== null) s.compValues.push(r.compliance);
    s.usedDays.push(r.used_days);
  });

  const stats = Object.values(hospitalStats).map(s => {
    const avg = s.compValues.length ? s.compValues.reduce((a,b) => a + b, 0) / s.compValues.length : 0;
    const noUseRate = s.total ? (s.noUse / s.total * 100) : 0;
    const avgUsed = s.usedDays.length ? s.usedDays.reduce((a,b) => a + b, 0) / s.usedDays.length : 0;
    return { ...s, avg, noUseRate, avgUsed };
  });

  // ── KPI 테이블 ──
  const sortedByAvg = [...stats].sort((a,b) => a.avg - b.avg);
  const kpiHtml = `<table class="hospital-kpi-table">
    <thead><tr>
      <th>기관</th><th>전체</th><th>사용중</th><th>만료</th>
      <th>미사용자</th><th>미사용률</th><th>옐로카드</th>
      <th>평균 사용일</th><th>평균 순응률</th>
    </tr></thead>
    <tbody>${sortedByAvg.map(s => {
      const compColor = s.avg >= 80 ? "#10b981" : s.avg >= 50 ? "#f59e0b" : "#ef4444";
      const noUseColor = s.noUseRate > 30 ? "#ef4444" : s.noUseRate > 15 ? "#f59e0b" : "#64748b";
      return `<tr>
        <td style="text-align:left;font-weight:600">${s.hospital}</td>
        <td>${s.total}명</td><td>${s.active}명</td><td>${s.ended}명</td>
        <td style="color:${s.noUse > 0 ? '#ef4444' : '#94a3b8'}">${s.noUse}명</td>
        <td style="color:${noUseColor};font-weight:600">${s.noUseRate.toFixed(1)}%</td>
        <td style="color:${s.yellowCards > 0 ? '#ef4444' : '#94a3b8'}">${s.yellowCards}</td>
        <td>${s.avgUsed.toFixed(1)}일</td>
        <td style="color:${compColor};font-weight:700">${s.avg.toFixed(1)}%</td>
      </tr>`;
    }).join("")}</tbody>
  </table>`;
  document.getElementById("hospital-kpi-wrap").innerHTML = kpiHtml;

  // ── 자동 인사이트 생성 ──
  const insights = [];
  const totalAll = stats.reduce((s,h) => s + h.total, 0);
  const avgAll = validRows.reduce((s,r) => s + r.compliance, 0) / validRows.length;

  // 1) 가장 순응률 낮은 기관
  const worst = sortedByAvg[0];
  if (worst && worst.avg < avgAll) {
    insights.push({
      type: "danger",
      title: "⚠️ 순응률 최하위 기관",
      text: `<strong>${worst.hospital}</strong>의 평균 순응률이 <strong>${worst.avg.toFixed(1)}%</strong>로 전체 평균(${avgAll.toFixed(1)}%) 대비 ${(avgAll - worst.avg).toFixed(1)}%p 낮습니다.`,
    });
  }

  // 2) 미사용률 높은 기관
  const highNoUse = stats.filter(s => s.noUseRate > 20 && s.total >= 2).sort((a,b) => b.noUseRate - a.noUseRate);
  if (highNoUse.length) {
    insights.push({
      type: "warning",
      title: "🚨 미사용률 주의 기관",
      text: highNoUse.map(s => `<strong>${s.hospital}</strong>: ${s.noUse}/${s.total}명 미사용 (${s.noUseRate.toFixed(1)}%)`).join("<br>"),
    });
  }

  // 3) 옐로카드 많은 기관
  const highYellow = stats.filter(s => s.yellowCards >= 2).sort((a,b) => b.yellowCards - a.yellowCards);
  if (highYellow.length) {
    insights.push({
      type: "danger",
      title: "🟡 옐로카드 집중 기관",
      text: highYellow.map(s => `<strong>${s.hospital}</strong>: 활성 옐로카드 ${s.yellowCards}건`).join("<br>"),
    });
  }

  // 4) 우수 기관
  const best = [...stats].filter(s => s.compValues.length >= 2).sort((a,b) => b.avg - a.avg)[0];
  if (best && best.avg > avgAll) {
    insights.push({
      type: "success",
      title: "🏆 순응률 우수 기관",
      text: `<strong>${best.hospital}</strong>의 평균 순응률이 <strong>${best.avg.toFixed(1)}%</strong>로 가장 높습니다.`,
    });
  }

  // 5) 기관간 편차
  if (stats.length >= 2) {
    const maxAvg = Math.max(...stats.map(s => s.avg));
    const minAvg = Math.min(...stats.map(s => s.avg));
    const gap = maxAvg - minAvg;
    if (gap > 20) {
      insights.push({
        type: "warning",
        title: "📊 기관 간 편차",
        text: `기관 간 평균 순응률 차이가 <strong>${gap.toFixed(1)}%p</strong>로, 관리 격차가 큽니다. 하위 기관의 사용 독려가 필요합니다.`,
      });
    }
  }

  // 6) 전체 미사용자 없으면 긍정 메시지
  const totalNoUse = stats.reduce((s,h) => s + h.noUse, 0);
  if (totalNoUse === 0 && totalAll > 0) {
    insights.push({
      type: "success",
      title: "✅ 전원 사용 중",
      text: "모든 기관에서 미사용자가 없습니다. 초기 온보딩이 양호합니다.",
    });
  }

  const insightHtml = insights.length ? `<div class="insight-grid">${insights.map(i =>
    `<div class="insight-card">
      <h3>${i.title} <span class="insight-tag ${i.type}">${i.type === "danger" ? "위험" : i.type === "warning" ? "주의" : "양호"}</span></h3>
      <div style="font-size:13px;color:var(--c-text-secondary);line-height:1.6">${i.text}</div>
    </div>`
  ).join("")}</div>` : "";
  document.getElementById("hospital-insights").innerHTML = insightHtml;

  // ── 평균 순응률 바 차트 ──
  const entries = sortedByAvg;
  const yLabels  = entries.map(e => `${e.hospital} (${e.total}명)`);
  const xValues  = entries.map(e => parseFloat(e.avg.toFixed(1)));
  const colors   = entries.map(e => e.avg >= 80 ? "#22c55e" : e.avg >= 50 ? "#6366f1" : "#f87171");
  const textVals = xValues.map(v => v + "%");

  Plotly.newPlot("hospital-chart", [{
    type: "bar",
    orientation: "h",
    x: xValues,
    y: yLabels,
    marker: { color: colors },
    text: textVals,
    textposition: "outside",
  }], {
    title: { text: "평균 순응률", font: { size: 14 } },
    xaxis: { title: "순응률(%)", range: [0, 115] },
    margin: { l: 200, r: 60, t: 40, b: 50 },
    height: Math.max(300, entries.length * 50),
    paper_bgcolor: "white",
    plot_bgcolor: "white",
  }, { responsive: true });

  // ── 기관별 박스플롯 ──
  const boxTraces = [...stats].sort((a,b) => a.avg - b.avg).map(s => ({
    type: "box",
    y: s.compValues,
    name: s.hospital.replace(/대학교/g, "대"),
    marker: { color: s.avg >= 80 ? "#22c55e" : s.avg >= 50 ? "#6366f1" : "#f87171" },
    boxpoints: "all",
    jitter: 0.4,
    pointpos: 0,
  }));

  Plotly.newPlot("hospital-box-chart", boxTraces, {
    title: { text: "순응률 분포", font: { size: 14 } },
    yaxis: { title: "순응률(%)", range: [-5, 110] },
    margin: { l: 50, r: 20, t: 40, b: 80 },
    height: Math.max(300, entries.length * 50),
    showlegend: false,
    paper_bgcolor: "white",
    plot_bgcolor: "white",
  }, { responsive: true });
}

// ── 탭 전환 ──────────────────────────────────────────────────────────────
const TAB_IDS = ["table", "heatmap", "dist", "hospital"];

function switchTab(name, btn) {
  TAB_IDS.forEach(id => {
    document.getElementById(`tab-${id}`).style.display = id === name ? "" : "none";
  });
  document.querySelectorAll("#main-tabs .tab-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");

  // 탭 전환 시 차트 재렌더 (Plotly responsive 갱신)
  if (name === "heatmap") renderHeatmap();
  if (name === "dist")    renderDist();
  if (name === "hospital") { renderHospitalChart(); }
  setTimeout(() => { Plotly.Plots.resize(document.getElementById(`tab-${name}`)); }, 100);
}

// ── 초기 로드 ────────────────────────────────────────────────────────────
loadData();
</script>
