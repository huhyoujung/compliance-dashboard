name: Daily Slack Report

on:
  schedule:
    # 매일 KST 12:30 = UTC 03:30
    - cron: "30 3 * * *"
  workflow_dispatch: # 수동 실행도 가능

jobs:
  screenshot-and-notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm init -y
          npm install playwright

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Take screenshots & send to Slack
        env:
          DASHBOARD_URL: "https://huhyoujung.github.io/compliance-dashboard/"
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: node scripts/screenshot-and-notify.mjs
